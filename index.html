<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FLIXX.COM</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* HEADER */
.header {
    background: #1e293b;
    padding: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.logo {
    font-size: 28px;
    font-weight: bold;
    color: #4da6ff;
}

.logo span {
    color: white;
}

.search {
    width: 300px;
    padding: 8px;
    border-radius: 5px;
    border: none;
}

/* TITLE */
.title {
    padding: 20px;
    font-size: 22px;
    color: #f59e0b;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card-title {
    padding: 10px;
    font-size: 14px;
}

/* VIDEO PAGE */
.video-container {
    padding: 20px;
}

iframe {
    width: 100%;
    height: 500px;
    border: none;
}
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">FLIXX<span>.COM</span></div>
    <input class="search" type="text" placeholder="Search videos...">
</div>

<div class="title">VIDEOS GRATUITES</div>

<!-- VIDEOS GRID -->
<div class="container">

    <!-- VIDEO 1 -->
    <a href="video1.html">
        <div class="card">
            <img src="https://picsum.photos/400/200?1">
            <div class="card-title">Hot Video 🔥</div>
        </div>
    </a>

    <!-- VIDEO 2 -->
    <a href="video2.html">
        <div class="card">
            <img src="https://picsum.photos/400/200?2">
            <div class="card-title">Trending ⭐</div>
        </div>
    </a>

    <!-- VIDEO 3 -->
    <a href="video3.html">
        <div class="card">
            <img src="https://picsum.photos/400/200?3">
            <div class="card-title">New Video 🎬</div>
        </div>
    </a>

</div>

</body>
</html>
