 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VideoHub</title>
<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}
header {
  text-align:center;
  padding:15px;
  background:#020617;
  color:#f43f5e;
}
.container {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(250px,1fr));
  gap:15px;
  padding:15px;
}
.card {
  background:#1e293b;
  padding:10px;
  border-radius:10px;
}
.card iframe {
  width:100%;
  height:150px;
  border-radius:8px;
}
.title {
  font-size:14px;
  margin-top:5px;
}
</style>
</head>

<body>

<header>🔥 VideoHub</header>

<div class="container">

  <div class="card">
    <iframe src="https://www.xvideos.com/embedframe/123456"></iframe>
    <div class="title">Hot Video</div>
  </div>

  <div class="card">
    <iframe src="https://www.xvideos.com/embedframe/654321"></iframe>
    <div class="title">Trending Video</div>
  </div>

  <div class="card">
    <iframe src="https://www.xvideos.com/embedframe/111111"></iframe>
    <div class="title">New Video</div>
  </div>

</div>

</body>
</html>
