<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VideoHub</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
}

/* HEADER */
header {
  background: #000;
  padding: 15px;
  text-align: center;
  font-size: 28px;
  color: orange;
  font-weight: bold;
  border-bottom: 2px solid orange;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* CARD */
.card {
  background: #1c1c1c;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* TITLE */
.title {
  padding: 10px;
  font-size: 14px;
}
</style>

</head>

<body>

<header>🔥 VideoHub</header>

<div class="container">

  <!-- VIDEO 1 -->
  <a href="video1.html">
    <div class="card">
      <img src="https://source.unsplash.com/400x250/?movie">
      <div class="title">Hot Video 🔥</div>
    </div>
  </a>

  <!-- VIDEO 2 -->
  <a href="video2.html">
    <div class="card">
      <img src="https://source.unsplash.com/400x250/?night">
      <div class="title">Trending ⭐</div>
    </div>
  </a>

  <!-- VIDEO 3 -->
  <a href="video3.html">
    <div class="card">
      <img src="https://source.unsplash.com/400x250/?dark">
      <div class="title">New Video 🆕</div>
    </div>
  </a>

</div>

</body>
</html>
