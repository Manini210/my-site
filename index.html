<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FLIXX.COM</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px 20px;
}

.logo {
    font-size: 42px;
    font-weight: bold;
    color: #4da6ff;
}

.subtitle {
    color: orange;
    margin-top: 5px;
}

/* SEARCH */
.search-box {
    margin-top: 20px;
}

.search-box input {
    width: 300px;
    max-width: 90%;
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
    font-size: 14px;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: #111827;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

/* TITLE */
.title {
    padding: 10px;
    font-size: 14px;
    color: #ddd;
    text-align: center;
}
</style>

</head>

<body>

<header>
    <div class="logo">FLIXX.COM</div>
    <div class="subtitle">VIDEOS GRATUITES</div>

    <div class="search-box">
        <input type="text" placeholder="Search videos...">
    </div>
</header>

<div class="container">

    <!-- VIDEO 1 -->
    <div class="card">
        <a href="video1.html">
            <img src="https://via.placeholder.com/300x200">
        </a>
    ></div>
    </div>

    <!-- VIDEO 2 -->
    <div class="card">
        <a href="video2.html">
            <img src="https://via.placeholder.com/300x200">
        </a>
        <div class="title"></div>
    </div>

    <!-- VIDEO 3 -->
    <div class="card">
        <a href="video3.html">
            <img src="https://via.placeholder.com/300x200">
        </a>
    </div>
    </div>

</div>

</body>
</html>
