<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FLIXX.COM</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

/* HEADER CENTER */
.header {
    padding: 30px;
}

.logo {
    font-size: 40px;
    font-weight: bold;
    color: #4da6ff;
}

.logo span {
    color: white;
}

.subtitle {
    font-size: 20px;
    color: orange;
    margin-top: 10px;
}

/* VIDEOS GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px,1fr));
    gap: 20px;
    padding: 20px;
}

/* VIDEO CARD */
.card {
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

iframe {
    width: 100%;
    height: 200px;
    border: none;
}

.title {
    padding: 10px;
    font-size: 14px;
}
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">FLIXX<span>.COM</span></div>
    <div class="subtitle">VIDEOS GRATUITES</div>
</div>

<!-- VIDEOS -->
<div class="container">

    <div class="card">
        <iframe src="https://www.eporner.com/embed/EjnFsRuZCok/" allowfullscreen></iframe>
        <div class="title">Hot Video 🔥</div>
    </div>
    </div>

</div>

</body>
</html>
