<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VideoHub</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: Arial;
  color: white;
}

header {
header {
  font-size: 32px;
  padding: 20px;
  color: orange;
  text-align: center;
  font-weight: bold;
}
.logo {
  color: orange;
  font-size: 22px;
  font-weight: bold;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1c1c1c;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
}

.title {
  padding: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<header>
  <div class="logo">🔥 VideoHub</div>
</header>

<div class="container">

<a href="video1.html">
  <div class="card">
    <img src="https://via.placeholder.com/300x180">
    <div class="title">Hot Video</div>
  </div>
</a>

<a href="video2.html">
  <div class="card">
    <img src="https://via.placeholder.com/300x180">
    <div class="title">Trending</div>
  </div>
</a>

<a href="video3.html">
  <div class="card">
    <img src="https://via.placeholder.com/300x180">
    <div class="title">New</div>
  </div>
</a>

</div>

</body>
</html>
