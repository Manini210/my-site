<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VideoHub</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d1b3d;
  color: white;
}

/* HEADER */
header {
  background: #0a1630;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* LOGO */
.logo {
  font-size: 28px;
  font-weight: bold;
}

.logo span {
  color: orange;
}

/* SEARCH */
.search {
  padding: 8px;
  width: 250px;
  border-radius: 5px;
  border: none;
}

/* TITLE */
.title {
  padding: 15px;
  font-size: 22px;
  color: orange;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* CARD */
.card {
  background: #111;
  border-radius: 8px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

/* TEXT */
.card p {
  padding: 8px;
  font-size: 14px;
}
</style>

</head>

<body>

<header>
  <div class="logo">XNXX<span>.CLONE</span></div>
  <input class="search" placeholder="Search videos...">
</header>

<div class="title">VIDEOS GRATUITES</div>
