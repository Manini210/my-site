<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FLIXX.COM</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px;
}

.logo {
    font-size: 40px;
    font-weight: bold;
    color: #4da6ff;
}

.subtitle {
    color: orange;
    margin-top: 5px;
}

/* VIDEOS GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* CARD */
.card {
    background: #111;
    border-radius: 10px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

/* TITLE */
.title {
    padding: 10px;
    font-size: 14px;
    color: #ccc;
    text-align: center;
}
</style>

</head>

<body>

<header>
    <div class="logo">FLIXX.COM</div>
    <div class="subtitle">VIDEOS GRATUITES</div>
</header>

<div class="container">

    <!-- VIDEO 1 -->
    <div class="card">
        <a href="video1.html">
            <img src="https://via.placeholder.com/300x200">
        </a>
        <div class="title">Video 1</div>
    </div>

    <!-- VIDEO 2 -->
    <div class="card">
        <a href="video2.html">
            <img src="https://via.placeholder.com/300x200">
        </a>
        <div class="title">Video 2</div>
    </div>

    <!-- VIDEO 3 -->
    <div class="card">
        <a href="video3.html">
            <img src="https://via.placeholder.com/300x200">
        </a>
        <div class="title">Video 3</div>
    </div>

</div>

</body>
</html>
